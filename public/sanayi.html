<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sanayi Haritası — arabalariseviyoruz.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0f1014; --bg2:#16181e; --bg3:#1d1f27;
  --border:#24262f; --border2:#32353f;
  --text:#e4e6ed; --text2:#8b8fa4; --text3:#484c5e;
  --accent:#e03030; --acc2:#ff4d4d;
  --green:#2ecc71; --amber:#f0a500; --blue:#4a90d9;
  --font:'Barlow',sans-serif; --fontc:'Barlow Condensed',sans-serif;
}
html, body { height: 100%; }
body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:13px; overflow:hidden; display:flex; flex-direction:column; }
::-webkit-scrollbar{width:5px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* TOPBAR */
.topbar { height:46px; background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 14px; gap:12px; flex-shrink:0; z-index:1000; }
.topbar-logo { font-family:var(--fontc); font-size:1.2rem; font-weight:700; color:var(--text); text-decoration:none; flex-shrink:0; }
.topbar-logo span { color:var(--accent); }
.topbar-back { font-size:.8rem; color:var(--text3); text-decoration:none; transition:color .15s; }
.topbar-back:hover { color:var(--text); }

/* FILTERS */
.filters { height:46px; background:var(--bg2); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 14px; gap:10px; flex-shrink:0; overflow-x:auto; }
.filters::-webkit-scrollbar { height:0; }
.filter-select { background:var(--bg3); border:1px solid var(--border); border-radius:5px; padding:5px 10px; color:var(--text); font-family:var(--font); font-size:.8rem; outline:none; cursor:pointer; }
.filter-select:focus { border-color:var(--border2); }
.filter-select option { background:var(--bg2); }
.search-box { background:var(--bg3); border:1px solid var(--border); border-radius:5px; padding:5px 10px; color:var(--text); font-family:var(--font); font-size:.8rem; outline:none; width:200px; }
.search-box::placeholder { color:var(--text3); }
.search-box:focus { border-color:var(--border2); }
.btn { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:5px; font-family:var(--font); font-size:.8rem; font-weight:600; cursor:pointer; border:none; transition:all .15s; white-space:nowrap; }
.btn-accent { background:var(--accent); color:#fff; }
.btn-accent:hover { background:var(--acc2); }
.btn-ghost { background:var(--bg3); color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover { color:var(--text); }
.btn-sm { padding:4px 9px; font-size:.75rem; }
.filter-count { font-size:.75rem; color:var(--text3); white-space:nowrap; }

/* MAIN LAYOUT */
.main { flex:1; display:grid; grid-template-columns:340px 1fr; overflow:hidden; }

/* SOL: LİSTE */
.list-panel { display:flex; flex-direction:column; border-right:1px solid var(--border); overflow:hidden; background:var(--bg); }
.list-header { padding:10px 14px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; background:var(--bg2); flex-shrink:0; }
.list-header-title { font-family:var(--fontc); font-size:.95rem; font-weight:700; }
.list-body { flex:1; overflow-y:auto; }

.biz-card { padding:12px 14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background .1s; }
.biz-card:hover { background:var(--bg2); }
.biz-card.active { background:rgba(224,48,48,.06); border-left:3px solid var(--accent); }
.biz-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:4px; }
.biz-name { font-size:.9rem; font-weight:700; color:var(--text); line-height:1.3; }
.biz-cat { font-size:.68rem; font-weight:700; padding:1px 6px; border-radius:3px; background:var(--bg3); color:var(--text3); border:1px solid var(--border2); flex-shrink:0; }
.biz-addr { font-size:.77rem; color:var(--text3); margin-bottom:5px; }
.biz-footer { display:flex; align-items:center; gap:10px; }
.biz-stars { color:var(--amber); font-size:.8rem; }
.biz-rating-num { font-size:.78rem; font-weight:700; color:var(--text2); }
.biz-review-cnt { font-size:.72rem; color:var(--text3); }
.price-dots { color:var(--green); font-size:.8rem; letter-spacing:1px; }
.biz-hours { font-size:.72rem; color:var(--text3); margin-left:auto; }
.biz-hours.open { color:var(--green); }
.biz-hours.closed { color:var(--accent); }

/* HARITA */
#map { width:100%; height:100%; }

/* LEAFLET DARK TEMA */
.leaflet-tile { filter: brightness(0.7) invert(1) contrast(1.3) hue-rotate(200deg) saturate(0.4) brightness(0.7); }
.leaflet-container { background:#0f1014; }
.leaflet-control-zoom a { background:var(--bg2) !important; color:var(--text) !important; border-color:var(--border) !important; }
.leaflet-popup-content-wrapper { background:var(--bg2); color:var(--text); border:1px solid var(--border2); border-radius:8px; box-shadow:0 8px 24px rgba(0,0,0,.5); }
.leaflet-popup-tip { background:var(--bg2); }
.leaflet-popup-close-button { color:var(--text3) !important; }

/* POPUP */
.popup-name { font-family:var(--fontc); font-size:1rem; font-weight:700; color:var(--text); margin-bottom:3px; }
.popup-cat { font-size:.72rem; color:var(--text3); margin-bottom:6px; }
.popup-rating { font-size:.82rem; color:var(--amber); margin-bottom:4px; }
.popup-addr { font-size:.78rem; color:var(--text3); margin-bottom:8px; }

/* DETAY PANEL */
.detail-panel {
  position:absolute; right:0; top:0; bottom:0;
  width:380px; background:var(--bg2);
  border-left:1px solid var(--border);
  z-index:900; overflow-y:auto;
  transform:translateX(100%);
  transition:transform .25s ease;
}
.detail-panel.open { transform:translateX(0); }
.detail-close { position:absolute; top:12px; right:12px; background:var(--bg3); border:none; color:var(--text2); width:28px; height:28px; border-radius:50%; cursor:pointer; font-size:.9rem; display:grid; place-items:center; transition:all .15s; z-index:1; }
.detail-close:hover { color:var(--text); background:var(--border2); }
.detail-photo { width:100%; height:160px; background:var(--bg3); display:flex; align-items:center; justify-content:center; font-size:3rem; overflow:hidden; }
.detail-photo img { width:100%; height:100%; object-fit:cover; }
.detail-body { padding:16px; }
.detail-name { font-family:var(--fontc); font-size:1.3rem; font-weight:800; color:var(--text); margin-bottom:3px; }
.detail-cat-badge { display:inline-block; font-size:.72rem; font-weight:700; padding:2px 8px; border-radius:3px; background:rgba(224,48,48,.12); color:var(--accent); border:1px solid rgba(224,48,48,.25); margin-bottom:10px; }
.detail-section { margin-bottom:14px; }
.detail-section-title { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.8px; color:var(--text3); margin-bottom:6px; }
.detail-row { display:flex; align-items:center; gap:8px; font-size:.83rem; color:var(--text2); margin-bottom:5px; }
.detail-row-icon { font-size:.9rem; width:18px; flex-shrink:0; }
.rating-bar-row { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.rating-bar-label { font-size:.75rem; color:var(--text3); width:14px; text-align:center; }
.rating-bar-track { flex:1; height:5px; background:var(--border2); border-radius:3px; overflow:hidden; }
.rating-bar-fill { height:100%; background:var(--amber); border-radius:3px; }
.rating-big { font-family:var(--fontc); font-size:2.5rem; font-weight:800; color:var(--amber); line-height:1; }
.stars-row { color:var(--amber); font-size:.9rem; margin-top:2px; }

/* YORUM */
.review-item { padding:10px 0; border-bottom:1px solid var(--border); }
.review-item:last-child { border-bottom:none; }
.review-top { display:flex; align-items:center; gap:8px; margin-bottom:4px; }
.review-author { font-size:.82rem; font-weight:700; color:var(--text); }
.review-stars { color:var(--amber); font-size:.78rem; }
.review-time { font-size:.72rem; color:var(--text3); margin-left:auto; }
.review-body { font-size:.82rem; color:var(--text2); line-height:1.5; }

/* YORUM FORMU */
.review-form { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:12px; margin-top:12px; }
.star-picker { display:flex; gap:4px; margin-bottom:8px; }
.star-btn { font-size:1.2rem; cursor:pointer; opacity:.35; transition:opacity .1s; background:none; border:none; padding:0; }
.star-btn.active { opacity:1; }
.review-textarea { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:5px; padding:7px 9px; color:var(--text); font-family:var(--font); font-size:.82rem; resize:none; outline:none; min-height:60px; }
.review-textarea::placeholder { color:var(--text3); }

/* EKLE MODAL */
.overlay { position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:2000; display:grid; place-items:center; padding:16px; opacity:0; pointer-events:none; transition:opacity .18s; }
.overlay.open { opacity:1; pointer-events:all; }
.modal { background:var(--bg2); border:1px solid var(--border2); border-radius:10px; width:100%; max-width:500px; max-height:90vh; overflow-y:auto; padding:20px; transform:translateY(8px); transition:transform .18s; }
.overlay.open .modal { transform:translateY(0); }
.modal-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
.modal-title { font-family:var(--fontc); font-size:1.2rem; font-weight:700; }
.modal-close { background:none; border:none; color:var(--text3); cursor:pointer; font-size:1rem; padding:2px 6px; border-radius:4px; }
.modal-close:hover { background:var(--bg3); color:var(--text); }
.fg { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
.fg label { font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text3); }
.fg input, .fg select, .fg textarea { background:var(--bg3); border:1px solid var(--border); border-radius:5px; padding:7px 10px; color:var(--text); font-family:var(--font); font-size:.85rem; outline:none; width:100%; }
.fg input::placeholder, .fg textarea::placeholder { color:var(--text3); }
.fg input:focus, .fg select:focus, .fg textarea:focus { border-color:var(--border2); }
.fg select option { background:var(--bg2); }
.fg textarea { resize:vertical; min-height:60px; }
.form-row { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.auth-error { font-size:.78rem; color:var(--accent); display:none; margin-bottom:8px; }
.auth-error.show { display:block; }
.spinner { display:inline-block; width:13px; height:13px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to{transform:rotate(360deg)} }

/* TOAST */
.toast { position:fixed; bottom:20px; right:20px; z-index:3000; background:var(--bg2); border:1px solid var(--border2); border-radius:6px; padding:10px 16px; font-size:.82rem; opacity:0; transform:translateY(6px); transition:all .2s; pointer-events:none; box-shadow:0 6px 20px rgba(0,0,0,.4); }
.toast.show { opacity:1; transform:translateY(0); }
.toast.ok { border-left:3px solid var(--green); }
.toast.err { border-left:3px solid var(--accent); }
/* LIGHT MODE */
body.light{--bg:#f4f5f7;--bg2:#ffffff;--bg3:#eceef2;--border:#dde0e8;--border2:#c8ccd6;--text:#1a1c24;--text2:#4a4e62;--text3:#9096b0;--accent:#d42a2a;--acc2:#e84040;--green:#1a9e52;--amber:#c47f00;--blue:#2970c7;}
body.light .leaflet-tile{filter:none;}
body.light .leaflet-container{background:#e8e8e8;}
.theme-toggle{width:32px;height:18px;background:var(--border2);border-radius:9px;position:relative;cursor:pointer;border:none;transition:background .2s;flex-shrink:0;}
.theme-toggle.dark{background:var(--accent);}
.theme-toggle::after{content:'';position:absolute;width:13px;height:13px;background:#fff;border-radius:50%;top:2.5px;left:2.5px;transition:transform .2s;}
.theme-toggle.dark::after{transform:translateX(14px);}
</style>
</head>

  { id:6, name:'LPG Merkezi', category:'lpg', city:'Izmir', district:'Bornova', address:'Kazimdirik Mah. No:8, Bornova', phone:'0232 456 12 34', avg_rating:4.8, review_count:67, price_range:2, open_time:'08:00', close_time:'18:00', open_days:'Pzt-Cmt', lat:38.4667, lng:27.2167, description:'LPG montaj ve bakim. Yetki belgeli.' },
  { id:7, name:'Detay Oto Yikama', category:'oto-yikama', city:'Istanbul', district:'Sisli', address:'Halaskargazi Cad. No:23, Sisli', phone:'0212 123 45 67', avg_rating:4.6, review_count:89, price_range:3, open_time:'08:00', close_time:'20:00', open_days:'Pzt-Paz', lat:41.0614, lng:28.9897, description:'El yikama, iç temizlik, seramik kaplama.' },
  { id:8, name:'Guven Ekspertiz', category:'ekspertiz', city:'Bursa', district:'Osmangazi', address:'Organize Sanayi Blg. No:5, Bursa', phone:'0224 321 54 76', avg_rating:4.9, review_count:143, price_range:2, open_time:'09:00', close_time:'18:00', open_days:'Pzt-Cmt', lat:40.1826, lng:29.0674, description:'Ikinci el arac ekspertizi. Bagimsiz, tarafsiz.' },
];

let filtered = [...allBusinesses];
let map, markers = [], selectedId = null, myRating = 0;

// ── HARİTA ────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { center: [39.0, 35.0], zoom: 6 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap',
    maxZoom: 19
  }).addTo(map);
  renderMarkers();
}

function makeIcon(cat, selected) {
  const emoji = CAT_ICONS[cat] || '📌';
  const bg    = selected ? '#e03030' : '#16181e';
  const border = selected ? '#ff4d4d' : '#32353f';
  return L.divIcon({
    className: '',
    html: `<div style="background:${bg};border:2px solid ${border};border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,.4);cursor:pointer">${emoji}</div>`,
    iconSize: [32, 32],
    iconAnchor: [16, 16],
    popupAnchor: [0, -20]
  });
}

function renderMarkers() {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  filtered.forEach(b => {
    if (!b.lat || !b.lng) return;
    const m = L.marker([b.lat, b.lng], { icon: makeIcon(b.category, b.id === selectedId) })
      .addTo(map)
      .bindPopup(popupHtml(b), { maxWidth: 240 });
    m.on('click', () => openDetail(b.id));
    markers.push(m);
  });
}

function popupHtml(b) {
  const stars = starsHtml(b.avg_rating);
  return `<div style="min-width:180px">
    <div class="popup-name">${b.name}</div>
    <div class="popup-cat">${CAT_ICONS[b.category]} ${CAT_LABELS[b.category]}</div>
    <div class="popup-rating">${stars} <span style="color:var(--text2);font-size:.78rem">${b.avg_rating} (${b.review_count})</span></div>
    <div class="popup-addr">📍 ${b.district ? b.district+', ' : ''}${b.city}</div>
    <button onclick="openDetail(${b.id})" style="background:var(--accent);color:#fff;border:none;border-radius:4px;padding:5px 12px;font-size:.78rem;cursor:pointer;width:100%">Detayları Gör</button>
  </div>`;
}

// ── LİSTE ─────────────────────────────────────────────────────
function renderList() {
  const list = document.getElementById('listBody');
  document.getElementById('filterCount').textContent = filtered.length + ' işletme';
  if (!filtered.length) {
    list.innerHTML = '<div style="padding:24px;text-align:center;color:var(--text3)">Sonuç bulunamadı.</div>';
    return;
  }
  list.innerHTML = filtered.map(b => {
    const active = b.id === selectedId ? ' active' : '';
    const priceDots = '₺'.repeat(b.price_range);
    const isOpen = checkOpen(b);
    const hoursLabel = b.open_time ? (isOpen ? 'Açık' : 'Kapalı') : '';
    const hoursClass = isOpen ? 'biz-hours open' : 'biz-hours closed';
    return `<div class="biz-card${active}" onclick="openDetail(${b.id})">
      <div class="biz-card-top">
        <div class="biz-name">${CAT_ICONS[b.category] || '📌'} ${b.name}</div>
        <span class="biz-cat">${CAT_LABELS[b.category] || b.category}</span>
      </div>
      <div class="biz-addr">📍 ${b.district ? b.district+', ':'' }${b.city}</div>
      <div class="biz-footer">
        <span class="biz-stars">${starsHtml(b.avg_rating)}</span>
        <span class="biz-rating-num">${b.avg_rating}</span>
        <span class="biz-review-cnt">(${b.review_count})</span>
        <span class="price-dots">${priceDots}</span>
        ${hoursLabel ? `<span class="${hoursClass}">${hoursLabel}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function checkOpen(b) {
  if (!b.open_time || !b.close_time) return null;
  const now = new Date();
  const [oh, om] = b.open_time.split(':').map(Number);
  const [ch, cm] = b.close_time.split(':').map(Number);
  const cur = now.getHours() * 60 + now.getMinutes();
  return cur >= oh * 60 + om && cur <= ch * 60 + cm;
}

function starsHtml(rating) {
  const r = Math.round(rating * 2) / 2;
  let s = '';
  for (let i = 1; i <= 5; i++) s += i <= r ? '★' : '☆';
  return s;
}

// ── FİLTRE ────────────────────────────────────────────────────
function filterList() {
  const q    = document.getElementById('searchBox').value.toLowerCase();
  const city = document.getElementById('cityFilter').value.toLowerCase();
  const cat  = document.getElementById('catFilter').value;
  const minR = parseFloat(document.getElementById('ratingFilter').value) || 0;

  filtered = allBusinesses.filter(b => {
    if (q && !b.name.toLowerCase().includes(q) && !b.city.toLowerCase().includes(q) && !(b.district||'').toLowerCase().includes(q)) return false;
    if (city && b.city.toLowerCase() !== city) return false;
    if (cat  && b.category !== cat) return false;
    if (minR && b.avg_rating < minR) return false;
    return true;
  });

  renderList();
  renderMarkers();

  // Haritayı filtreli noktalara zoom
  if (filtered.filter(b => b.lat).length > 0) {
    const pts = filtered.filter(b => b.lat).map(b => [b.lat, b.lng]);
    if (pts.length === 1) map.setView(pts[0], 14);
    else map.fitBounds(pts, { padding: [40, 40] });
  }
}

// ── DETAY ─────────────────────────────────────────────────────
function openDetail(id) {
  selectedId = id;
  const b = allBusinesses.find(x => x.id === id);
  if (!b) return;

  renderList();
  renderMarkers();

  if (b.lat) map.setView([b.lat, b.lng], 15);

  const isOpen = checkOpen(b);
  const priceDots = '₺'.repeat(b.price_range);
  const photoHtml = (b.photos && b.photos.length)
    ? `<img src="${b.photos[0]}" style="width:100%;height:160px;object-fit:cover">`
    : `<div class="detail-photo" style="height:120px;font-size:2.5rem">${CAT_ICONS[b.category]||'🏭'}</div>`;

  // Puan dağılımı (sahte)
  const dist = {5:Math.round(b.review_count*0.5), 4:Math.round(b.review_count*0.3), 3:Math.round(b.review_count*0.12), 2:Math.round(b.review_count*0.05), 1:Math.round(b.review_count*0.03)};

  document.getElementById('detailContent').innerHTML = `
    ${photoHtml}
    <div class="detail-body">
      <div class="detail-name">${b.name}</div>
      <div><span class="detail-cat-badge">${CAT_ICONS[b.category]} ${CAT_LABELS[b.category]}</span></div>

      <div class="detail-section">
        <div class="detail-row"><span class="detail-row-icon">📍</span><span>${b.address}</span></div>
        ${b.phone ? `<div class="detail-row"><span class="detail-row-icon">📞</span><a href="tel:${b.phone}" style="color:var(--blue);text-decoration:none">${b.phone}</a></div>` : ''}
        ${b.open_time ? `<div class="detail-row"><span class="detail-row-icon">🕐</span><span>${b.open_days||''} ${b.open_time}-${b.close_time} <span style="color:${isOpen?'var(--green)':'var(--accent)'}">${isOpen?'• Açık':'• Kapalı'}</span></span></div>` : ''}
        <div class="detail-row"><span class="detail-row-icon">💰</span><span style="color:var(--green)">${priceDots}</span> <span style="color:var(--text3)">${['','Uygun','Orta','Pahalı','Çok Pahalı'][b.price_range]}</span></div>
      </div>

      ${b.description ? `<div class="detail-section"><div class="detail-section-title">Hakkında</div><p style="font-size:.83rem;color:var(--text2);line-height:1.55">${b.description}</p></div>` : ''}

      <div class="detail-section">
        <div class="detail-section-title">Puanlar</div>
        <div style="display:flex;gap:16px;align-items:center">
          <div>
            <div class="rating-big">${b.avg_rating}</div>
            <div class="stars-row">${starsHtml(b.avg_rating)}</div>
            <div style="font-size:.72rem;color:var(--text3);margin-top:2px">${b.review_count} yorum</div>
          </div>
          <div style="flex:1">
            ${[5,4,3,2,1].map(n => `
              <div class="rating-bar-row">
                <span class="rating-bar-label">${n}</span>
                <div class="rating-bar-track"><div class="rating-bar-fill" style="width:${b.review_count ? (dist[n]/b.review_count*100).toFixed(0) : 0}%"></div></div>
              </div>`).join('')}
          </div>
        </div>
      </div>

      <div class="detail-section">
        <div class="detail-section-title">Yorumlar</div>
        <div id="reviewsList">${renderReviews(b)}</div>
        <div class="review-form" id="reviewForm">
          <div style="font-size:.78rem;font-weight:600;color:var(--text2);margin-bottom:6px">Puan ver</div>
          <div class="star-picker" id="starPicker">
            ${[1,2,3,4,5].map(n => `<button class="star-btn" data-n="${n}" onclick="setRating(${n})">★</button>`).join('')}
          </div>
          <textarea class="review-textarea" id="reviewText" placeholder="Deneyimini yaz (opsiyonel)..."></textarea>
          <button class="btn btn-accent btn-sm" style="margin-top:8px;width:100%" onclick="submitReview(${b.id})">Yorum Gönder</button>
        </div>
      </div>
    </div>`;

  document.getElementById('detailPanel').classList.add('open');
}

function renderReviews(b) {
  // Sahte yorumlar
  const fakeReviews = [
    { username:'Turbo_Berk', rating:5, body:'Isin ehlinde, hizli ve ucuz. Kesinlikle tavsiye ederim.', time:'2 gun' },
    { username:'dizel_ahmet', rating:4, body:'Iyiydi, biraz beklettiler ama is kalitesi guzel.', time:'1 hafta' },
  ];
  return fakeReviews.map(r => `
    <div class="review-item">
      <div class="review-top">
        <span class="review-author" onclick="openProfile('${r.username}')" style="cursor:pointer">${r.username}</span>
        <span class="review-stars">${starsHtml(r.rating)}</span>
        <span class="review-time">${r.time} önce</span>
      </div>
      ${r.body ? `<div class="review-body">${r.body}</div>` : ''}
    </div>`).join('');
}

function setRating(n) {
  myRating = n;
  document.querySelectorAll('.star-btn').forEach(btn => {
    btn.classList.toggle('active', parseInt(btn.dataset.n) <= n);
  });
}

async function submitReview(bizId) {
  if (!myRating) { showToast('Önce puan ver.', 'err'); return; }
  const body = document.getElementById('reviewText').value.trim();
  try {
    const data = await fetch('/api/businesses/' + bizId + '/reviews', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ rating: myRating, body })
    }).then(r => r.json());
    if (data.error) { showToast(data.error, 'err'); return; }
    showToast('Yorumun eklendi!', 'ok');
    document.getElementById('reviewText').value = '';
    myRating = 0;
    document.querySelectorAll('.star-btn').forEach(b => b.classList.remove('active'));
  } catch(e) { showToast('Sunucuya baglanamadi.', 'err'); }
}

function closeDetail() {
  selectedId = null;
  document.getElementById('detailPanel').classList.remove('open');
  renderList();
  renderMarkers();
}

// ── İŞLETME EKLE ──────────────────────────────────────────────
document.getElementById('btnAddBiz').addEventListener('click', async () => {
  const name = document.getElementById('add_name').value.trim();
  const city = document.getElementById('add_city').value;
  const addr = document.getElementById('add_address').value.trim();
  const errEl = document.getElementById('addErr');

  if (!name || !addr) { errEl.textContent='Ad ve adres zorunlu.'; errEl.classList.add('show'); return; }

  const btn = document.getElementById('btnAddBiz');
  btn.innerHTML = '<span class="spinner"></span>';

  const payload = {
    name, category: document.getElementById('add_cat').value,
    city, district: document.getElementById('add_district').value.trim(),
    address: addr,
    phone: document.getElementById('add_phone').value.trim(),
    description: document.getElementById('add_desc').value.trim(),
    open_time: document.getElementById('add_open').value,
    close_time: document.getElementById('add_close').value,
    open_days: document.getElementById('add_days').value.trim(),
    price_range: parseInt(document.getElementById('add_price').value),
    lat: parseFloat(document.getElementById('add_lat').value) || null,
    lng: parseFloat(document.getElementById('add_lng').value) || null,
  };

  try {
    const data = await fetch('/api/businesses', {
      method:'POST', credentials:'include',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(payload)
    }).then(r => r.json());

    btn.textContent = 'Gönder — Onay Beklesin';
    if (data.error || data.errors) { errEl.textContent = data.error || data.errors[0].msg; errEl.classList.add('show'); return; }
    closeModal('addModal');
    showToast('İşletme eklendi, onay bekleniyor!', 'ok');
  } catch(e) {
    btn.textContent = 'Gönder — Onay Beklesin';
    // Offline test için listeye ekle
    const newBiz = { id: Date.now(), ...payload, avg_rating:0, review_count:0, status:'pending' };
    allBusinesses.unshift(newBiz);
    closeModal('addModal');
    showToast('Eklendi (onay bekliyor)', 'ok');
    filterList();
  }
});

// ── MODAL ─────────────────────────────────────────────────────
const openModal  = id => document.getElementById(id).classList.add('open');
const closeModal = id => document.getElementById(id).classList.remove('open');
document.querySelectorAll('.overlay').forEach(o => {
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); });
});

// ── TOAST ─────────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── profil (index.html'den açık değilse stub) ─────────────────
function openProfile(u) { window.open('index.html#profile=' + u, '_blank'); }

// ── API'DEN VERİ YÜKLEMEYİ DENE ──────────────────────────────
async function loadFromAPI() {
  try {
    const data = await fetch('/api/businesses').then(r => r.json());
    if (data.businesses && data.businesses.length > 0) {
      allBusinesses = data.businesses;
      filtered = [...allBusinesses];
      renderList();
      renderMarkers();
    }
  } catch(e) {}
}

// ── BAŞLAT ────────────────────────────────────────────────────
initMap();
renderList();
loadFromAPI();

function toggleTheme(){const d=document.body.classList.toggle('light');document.getElementById('themeToggle').classList.toggle('dark',!d);localStorage.setItem('theme',d?'light':'dark');}
(function(){const s=localStorage.getItem('theme');if(s==='light'){document.body.classList.add('light');}else{document.getElementById('themeToggle').classList.add('dark');}})();
</script>
