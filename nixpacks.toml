[phases.setup]
nixPkgs = ["nodejs_20", "pnpm"]

[phases.install]
cmds = ["pnpm install --no-frozen-lockfile"]

[phases.build]
cmds = [
  "cd apps/api && pnpm prisma generate",
  "cd apps/api && pnpm build"
]

[phases.setup.env]
NIXPACKS_PATH = "/app/node_modules/.bin:$NIXPACKS_PATH"

[start]
cmd = "cd apps/api && pnpm start"
