apiVersion: apps/v1
kind: Deployment
metadata:
  name: araba-worker
  namespace: araba-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: araba-worker
  template:
    metadata:
      labels:
        app: araba-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/araba-api:staging
          command: ['npm', 'run', 'worker']
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: araba-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: araba-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: araba-secrets
                  key: JWT_SECRET
