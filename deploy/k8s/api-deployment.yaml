apiVersion: apps/v1
kind: Deployment
metadata:
  name: araba-api
  namespace: araba-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: araba-api
  template:
    metadata:
      labels:
        app: araba-api
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/araba-api:staging
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: '4000'
            - name: HOST
              value: '0.0.0.0'
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: araba-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: araba-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: araba-secrets
                  key: JWT_SECRET
---
apiVersion: v1
kind: Service
metadata:
  name: araba-api
  namespace: araba-staging
spec:
  selector:
    app: araba-api
  ports:
    - port: 4000
      targetPort: 4000
