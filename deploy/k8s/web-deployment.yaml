apiVersion: apps/v1
kind: Deployment
metadata:
  name: araba-web
  namespace: araba-staging
spec:
  replicas: 1
  selector:
    matchLabels:
      app: araba-web
  template:
    metadata:
      labels:
        app: araba-web
    spec:
      containers:
        - name: web
          image: ghcr.io/your-org/araba-web:staging
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: NEXT_PUBLIC_API_BASE
              value: https://api-staging.example.com/api
---
apiVersion: v1
kind: Service
metadata:
  name: araba-web
  namespace: araba-staging
spec:
  selector:
    app: araba-web
  ports:
    - port: 3000
      targetPort: 3000
