apiVersion: batch/v1
kind: CronJob
metadata:
  name: araba-db-migrate
  namespace: araba-staging
spec:
  schedule: '0 * * * *'
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: migrate
              image: ghcr.io/your-org/araba-api:staging
              command: ['npm', 'run', 'prisma:migrate']
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: araba-secrets
                      key: DATABASE_URL
