apiVersion: batch/v1
kind: CronJob
metadata:
  name: berra-db-migrate
  namespace: berra-staging
spec:
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: migrate
              image: ghcr.io/your-org/berra-api:staging
              command: ["npm", "run", "prisma:migrate"]
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: berra-secrets
                      key: DATABASE_URL
