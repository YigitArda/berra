apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: berra-staging
  namespace: berra-staging
spec:
  ingressClassName: nginx
  rules:
    - host: staging.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: berra-web
                port:
                  number: 3000
    - host: api-staging.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: berra-api
                port:
                  number: 4000
