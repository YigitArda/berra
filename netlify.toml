[build]
  command = "npm install --ignore-scripts && cd apps/web && pnpm install && pnpm run build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions.___netlify-handler]
  node_bundler = "nft"
  included_files = ["node_modules/styled-jsx/**/*", "apps/web/node_modules/styled-jsx/**/*"]

[functions.___netlify-odb-handler]
  node_bundler = "nft"
  included_files = ["node_modules/styled-jsx/**/*", "apps/web/node_modules/styled-jsx/**/*"]
