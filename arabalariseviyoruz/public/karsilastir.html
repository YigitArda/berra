<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Araç Karşılaştırma — arabalariseviyoruz.com</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0f1014; --bg2:#16181e; --bg3:#1d1f27;
  --border:#24262f; --border2:#32353f;
  --text:#e4e6ed; --text2:#8b8fa4; --text3:#484c5e;
  --accent:#e03030; --acc2:#ff4d4d;
  --green:#2ecc71; --amber:#f0a500; --blue:#4a90d9;
  --a-col:#4a90d9; --b-col:#e03030;
  --font:'Barlow',sans-serif; --fontc:'Barlow Condensed',sans-serif;
}
body { background:var(--bg); color:var(--text); font-family:var(--font); font-size:14px; min-height:100vh; }
::-webkit-scrollbar{width:6px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

.topbar { background:var(--bg2); border-bottom:1px solid var(--border); padding:0 24px; height:46px; display:flex; align-items:center; gap:16px; position:sticky; top:0; z-index:50; }
.topbar-logo { font-family:var(--fontc); font-size:1.2rem; font-weight:700; color:var(--text); text-decoration:none; }
.topbar-logo span { color:var(--accent); }
.topbar-back { font-size:.82rem; color:var(--text3); text-decoration:none; display:flex; align-items:center; gap:5px; transition:color .15s; }
.topbar-back:hover { color:var(--text); }

.hero { padding:36px 24px 32px; text-align:center; border-bottom:1px solid var(--border); background:var(--bg2); }
.hero-title { font-family:var(--fontc); font-size:2.2rem; font-weight:800; color:var(--text); margin-bottom:6px; }
.hero-sub { font-size:.92rem; color:var(--text2); }

/* INPUT PANEL */
.input-panel { display:grid; grid-template-columns:1fr 60px 1fr; gap:0; max-width:860px; margin:0 auto; padding:24px; align-items:start; }
.car-input-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:18px; }
.car-input-card.a { border-top:3px solid var(--a-col); }
.car-input-card.b { border-top:3px solid var(--b-col); }
.car-input-label { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.8px; margin-bottom:14px; }
.car-input-label.a { color:var(--a-col); }
.car-input-label.b { color:var(--b-col); }
.vs-divider { display:flex; align-items:center; justify-content:center; padding-top:60px; }
.vs-badge { width:40px; height:40px; background:var(--bg3); border:1px solid var(--border2); border-radius:50%; display:grid; place-items:center; font-family:var(--fontc); font-size:1rem; font-weight:800; color:var(--text3); }
.fg { display:flex; flex-direction:column; gap:4px; margin-bottom:10px; }
.fg label { font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.6px; color:var(--text3); }
.fg input, .fg select { background:var(--bg3); border:1px solid var(--border); border-radius:6px; padding:7px 10px; color:var(--text); font-family:var(--font); font-size:.88rem; outline:none; transition:border-color .15s; width:100%; }
.fg input:focus, .fg select:focus { border-color:var(--border2); }
.fg input::placeholder { color:var(--text3); }
.fg select option { background:var(--bg2); }
.btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; border-radius:6px; font-family:var(--font); font-size:.88rem; font-weight:600; cursor:pointer; border:none; transition:all .15s; }
.btn-accent { background:var(--accent); color:#fff; }
.btn-accent:hover { background:var(--acc2); }
.btn-ghost { background:var(--bg3); color:var(--text2); border:1px solid var(--border); }
.btn-ghost:hover { color:var(--text); }
.compare-btn-wrap { max-width:860px; margin:0 auto; padding:0 24px 24px; display:flex; justify-content:center; }

/* SONUÇ TABLOSU */
.result-section { max-width:860px; margin:0 auto; padding:0 24px 60px; display:none; }
.result-section.show { display:block; animation:fadeIn .3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.result-header { display:grid; grid-template-columns:180px 1fr 1fr; border-bottom:2px solid var(--border2); margin-bottom:0; }
.result-col-head { padding:16px 14px; font-weight:700; font-size:.95rem; }
.result-col-head.a { color:var(--a-col); border-bottom:3px solid var(--a-col); }
.result-col-head.b { color:var(--b-col); border-bottom:3px solid var(--b-col); }
.result-col-head.label { color:var(--text3); font-size:.72rem; text-transform:uppercase; letter-spacing:.6px; display:flex; align-items:flex-end; padding-bottom:18px; }

.result-row { display:grid; grid-template-columns:180px 1fr 1fr; border-bottom:1px solid var(--border); }
.result-row:hover { background:var(--bg2); }
.result-row .label-cell { padding:12px 14px; font-size:.82rem; font-weight:600; color:var(--text3); display:flex; align-items:center; }
.result-row .val-cell { padding:12px 14px; font-size:.88rem; color:var(--text2); display:flex; align-items:center; }
.result-row .val-cell.winner { color:var(--text); font-weight:700; }
.win-badge { display:inline-block; font-size:.65rem; font-weight:700; padding:1px 6px; border-radius:3px; margin-left:6px; }
.win-a { background:rgba(74,144,217,.15); color:var(--a-col); }
.win-b { background:rgba(224,48,48,.15); color:var(--b-col); }

/* BAR CHARTS */
.bar-row { display:flex; align-items:center; gap:8px; }
.bar-track { flex:1; height:6px; background:var(--border2); border-radius:3px; overflow:hidden; }
.bar-fill-a { height:100%; background:var(--a-col); border-radius:3px; transition:width .6s ease; }
.bar-fill-b { height:100%; background:var(--b-col); border-radius:3px; transition:width .6s ease; }
.bar-num { font-size:.78rem; font-weight:700; width:36px; text-align:right; }

/* SKOR */
.score-section { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:24px; }
.score-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:20px; text-align:center; }
.score-card.a { border-top:3px solid var(--a-col); }
.score-card.b { border-top:3px solid var(--b-col); }
.score-card-name { font-size:.82rem; font-weight:700; margin-bottom:4px; }
.score-card-name.a { color:var(--a-col); }
.score-card-name.b { color:var(--b-col); }
.score-card-num { font-family:var(--fontc); font-size:3rem; font-weight:800; line-height:1; }
.score-card-verdict { font-size:.9rem; font-weight:700; margin-top:6px; }
.score-card-sub { font-size:.78rem; color:var(--text3); margin-top:4px; }
.score-winner-banner { background:rgba(46,204,113,.08); border:1px solid rgba(46,204,113,.25); border-radius:8px; padding:14px 18px; text-align:center; margin-top:14px; font-size:.92rem; color:var(--green); font-weight:600; }

/* SPINNER */
.spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:#fff; border-radius:50%; animation:spin .6s linear infinite; }
@keyframes spin { to { transform:rotate(360deg) } }
</style>
</head>
<body>

<div class="topbar">
  <a class="topbar-logo" href="index.html">🚗 arabalariseviyoruz<span>.com</span></a>
  <a class="topbar-back" href="index.html">← Forum'a dön</a>
</div>

<div class="hero">
  <div class="hero-title">⚖️ Araç Karşılaştır</div>
  <div class="hero-sub">İki aracı yan yana koy, hangisi daha iyi gör</div>
</div>

<div class="input-panel">
  <!-- A ARACI -->
  <div class="car-input-card a">
    <div class="car-input-label a">🔵 A Aracı</div>
    <div class="fg"><label>Marka</label><input id="a_brand" placeholder="Toyota"></div>
    <div class="fg"><label>Model</label><input id="a_model" placeholder="Corolla"></div>
    <div class="fg"><label>Yıl</label><input id="a_year" type="number" placeholder="2019" min="1990" max="2026"></div>
    <div class="fg"><label>Kilometre</label><input id="a_km" type="number" placeholder="85000"></div>
    <div class="fg"><label>Fiyat (₺)</label><input id="a_price" type="number" placeholder="850000"></div>
    <div class="fg">
      <label>Yakıt Tipi</label>
      <select id="a_fuel">
        <option value="benzin">Benzin</option>
        <option value="dizel">Dizel</option>
        <option value="lpg">LPG</option>
        <option value="hibrit">Hibrit</option>
        <option value="elektrik">Elektrik</option>
      </select>
    </div>
    <div class="fg">
      <label>Şanzıman</label>
      <select id="a_gear">
        <option value="otomatik">Otomatik</option>
        <option value="manuel">Manuel</option>
      </select>
    </div>
    <div class="fg"><label>Motor Hacmi (cc)</label><input id="a_cc" type="number" placeholder="1600"></div>
  </div>

  <div class="vs-divider"><div class="vs-badge">VS</div></div>

  <!-- B ARACI -->
  <div class="car-input-card b">
    <div class="car-input-label b">🔴 B Aracı</div>
    <div class="fg"><label>Marka</label><input id="b_brand" placeholder="Honda"></div>
    <div class="fg"><label>Model</label><input id="b_model" placeholder="Civic"></div>
    <div class="fg"><label>Yıl</label><input id="b_year" type="number" placeholder="2019" min="1990" max="2026"></div>
    <div class="fg"><label>Kilometre</label><input id="b_km" type="number" placeholder="92000"></div>
    <div class="fg"><label>Fiyat (₺)</label><input id="b_price" type="number" placeholder="920000"></div>
    <div class="fg">
      <label>Yakıt Tipi</label>
      <select id="b_fuel">
        <option value="benzin">Benzin</option>
        <option value="dizel">Dizel</option>
        <option value="lpg">LPG</option>
        <option value="hibrit">Hibrit</option>
        <option value="elektrik">Elektrik</option>
      </select>
    </div>
    <div class="fg">
      <label>Şanzıman</label>
      <select id="b_gear">
        <option value="otomatik">Otomatik</option>
        <option value="manuel">Manuel</option>
      </select>
    </div>
    <div class="fg"><label>Motor Hacmi (cc)</label><input id="b_cc" type="number" placeholder="1500"></div>
  </div>
</div>

<div class="compare-btn-wrap">
  <button class="btn btn-accent" id="btnCompare" onclick="compare()" style="padding:11px 32px;font-size:1rem">
    ⚖️ Karşılaştır
  </button>
</div>

<!-- SONUÇLAR -->
<div class="result-section" id="resultSection">

  <div class="result-header">
    <div class="result-col-head label">Kriter</div>
    <div class="result-col-head a" id="rh_a">A Aracı</div>
    <div class="result-col-head b" id="rh_b">B Aracı</div>
  </div>

  <div id="resultRows"></div>

  <div class="score-section">
    <div class="score-card a">
      <div class="score-card-name a" id="sc_a_name">A Aracı</div>
      <div class="score-card-num" id="sc_a_num" style="color:var(--a-col)">–</div>
      <div class="score-card-verdict" id="sc_a_verdict">–</div>
      <div class="score-card-sub" id="sc_a_sub">–</div>
    </div>
    <div class="score-card b">
      <div class="score-card-name b" id="sc_b_name">B Aracı</div>
      <div class="score-card-num" id="sc_b_num" style="color:var(--b-col)">–</div>
      <div class="score-card-verdict" id="sc_b_verdict">–</div>
      <div class="score-card-sub" id="sc_b_sub">–</div>
    </div>
  </div>

  <div class="score-winner-banner" id="winnerBanner"></div>

</div>

<script>
const BRANDS = {toyota:2.0,honda:2.0,mazda:1.8,subaru:1.7,volkswagen:1.5,vw:1.5,skoda:1.5,hyundai:1.6,kia:1.6,renault:1.3,peugeot:1.2,citroen:1.2,fiat:1.1,dacia:1.4,ford:1.4,opel:1.3,bmw:1.4,mercedes:1.4,audi:1.3,nissan:1.5,suzuki:1.7,mitsubishi:1.6,volvo:1.6};
const YN = new Date().getFullYear();

function calcScore(brand, year, km, price) {
  const age = YN - year;
  const yas = age<=2?3:age<=5?2.5:age<=8?2:age<=12?1.3:age<=18?0.7:0.2;
  const kms = km<=30000?3:km<=60000?2.5:km<=100000?1.8:km<=150000?1:km<=200000?0.5:0.1;
  const base = 1500000 * Math.pow(0.88, age) * Math.max(0.6, 1-km/800000);
  const r = price/base;
  const fiy = r<=0.75?2:r<=0.95?1.6:r<=1.1?1.2:r<=1.3?0.7:0.2;
  const mar = BRANDS[brand.toLowerCase()] ?? 1.2;
  const total = parseFloat((yas+kms+fiy+mar).toFixed(2));
  return { total, yas, kms, fiy, mar };
}

function verdict(s) {
  if (s >= 7.5) return ['✓ ALINIR', '#2ecc71'];
  if (s >= 5)   return ['~ DÜŞÜN',  '#f0a500'];
  return ['✗ ALINMAZ', '#e03030'];
}

function fmtPrice(n) { return n.toLocaleString('tr-TR') + ' ₺'; }
function fmtKm(n)    { return n.toLocaleString('tr-TR') + ' km'; }

function row(label, aVal, bVal, aWins, barA, barB, maxBar) {
  const aW = aWins === 'a' ? '<span class="win-badge win-a">✓</span>' : '';
  const bW = aWins === 'b' ? '<span class="win-badge win-b">✓</span>' : '';
  const aClass = aWins === 'a' ? 'val-cell winner' : 'val-cell';
  const bClass = aWins === 'b' ? 'val-cell winner' : 'val-cell';

  let barHtml = '';
  if (maxBar) {
    const aPct = Math.min(100, (barA / maxBar * 100)).toFixed(0);
    const bPct = Math.min(100, (barB / maxBar * 100)).toFixed(0);
    barHtml = '<div style="margin-top:3px">'
      + '<div class="bar-row"><div class="bar-track"><div class="bar-fill-a" style="width:' + aPct + '%"></div></div></div>'
      + '<div class="bar-row" style="margin-top:3px"><div class="bar-track"><div class="bar-fill-b" style="width:' + bPct + '%"></div></div></div>'
      + '</div>';
  }

  return '<div class="result-row">'
    + '<div class="label-cell">' + label + '</div>'
    + '<div class="' + aClass + '">' + aVal + aW + '</div>'
    + '<div class="' + bClass + '">' + bVal + bW + '</div>'
    + '</div>';
}

function compare() {
  const a = {
    brand: document.getElementById('a_brand').value.trim(),
    model: document.getElementById('a_model').value.trim(),
    year:  parseInt(document.getElementById('a_year').value),
    km:    parseInt(document.getElementById('a_km').value),
    price: parseFloat(document.getElementById('a_price').value),
    fuel:  document.getElementById('a_fuel').value,
    gear:  document.getElementById('a_gear').value,
    cc:    parseInt(document.getElementById('a_cc').value) || 0,
  };
  const b = {
    brand: document.getElementById('b_brand').value.trim(),
    model: document.getElementById('b_model').value.trim(),
    year:  parseInt(document.getElementById('b_year').value),
    km:    parseInt(document.getElementById('b_km').value),
    price: parseFloat(document.getElementById('b_price').value),
    fuel:  document.getElementById('b_fuel').value,
    gear:  document.getElementById('b_gear').value,
    cc:    parseInt(document.getElementById('b_cc').value) || 0,
  };

  if (!a.brand || !b.brand || !a.year || !b.year || isNaN(a.km) || isNaN(b.km) || isNaN(a.price) || isNaN(b.price)) {
    alert('Her iki araç için de tüm alanları doldurun.'); return;
  }

  const sa = calcScore(a.brand, a.year, a.km, a.price);
  const sb = calcScore(b.brand, b.year, b.km, b.price);

  // Header
  document.getElementById('rh_a').textContent = a.brand + ' ' + a.model;
  document.getElementById('rh_b').textContent = b.brand + ' ' + b.model;

  // Satırlar
  const rows = [];
  const aAge = YN - a.year, bAge = YN - b.year;

  rows.push(row('Yıl', a.year, b.year, a.year > b.year ? 'a' : b.year > a.year ? 'b' : null));
  rows.push(row('Kilometre', fmtKm(a.km), fmtKm(b.km), a.km < b.km ? 'a' : b.km < a.km ? 'b' : null, a.km, b.km, Math.max(a.km, b.km)));
  rows.push(row('Fiyat', fmtPrice(a.price), fmtPrice(b.price), a.price < b.price ? 'a' : b.price < a.price ? 'b' : null, a.price, b.price, Math.max(a.price, b.price)));
  rows.push(row('Yaş', aAge + ' yıl', bAge + ' yıl', aAge < bAge ? 'a' : bAge < aAge ? 'b' : null));
  rows.push(row('Yakıt', a.fuel.charAt(0).toUpperCase()+a.fuel.slice(1), b.fuel.charAt(0).toUpperCase()+b.fuel.slice(1), null));
  rows.push(row('Şanzıman', a.gear.charAt(0).toUpperCase()+a.gear.slice(1), b.gear.charAt(0).toUpperCase()+b.gear.slice(1), null));
  if (a.cc && b.cc) rows.push(row('Motor Hacmi', a.cc + ' cc', b.cc + ' cc', null));

  // Puan detayları
  rows.push(row('Yaş puanı', sa.yas + ' / 3', sb.yas + ' / 3', sa.yas >= sb.yas ? 'a' : 'b', sa.yas, sb.yas, 3));
  rows.push(row('Km puanı', sa.kms + ' / 3', sb.kms + ' / 3', sa.kms >= sb.kms ? 'a' : 'b', sa.kms, sb.kms, 3));
  rows.push(row('Fiyat/değer', sa.fiy + ' / 2', sb.fiy + ' / 2', sa.fiy >= sb.fiy ? 'a' : 'b', sa.fiy, sb.fiy, 2));
  rows.push(row('Güvenilirlik', sa.mar + ' / 2', sb.mar + ' / 2', sa.mar >= sb.mar ? 'a' : 'b', sa.mar, sb.mar, 2));
  rows.push(row('TOPLAM PUAN', sa.total + ' / 10', sb.total + ' / 10', sa.total >= sb.total ? 'a' : 'b', sa.total, sb.total, 10));

  document.getElementById('resultRows').innerHTML = rows.join('');

  // Skor kartları
  const [averd, acol] = verdict(sa.total);
  const [bverd, bcol] = verdict(sb.total);
  document.getElementById('sc_a_name').textContent = a.brand + ' ' + a.model;
  document.getElementById('sc_b_name').textContent = b.brand + ' ' + b.model;
  document.getElementById('sc_a_num').textContent = sa.total;
  document.getElementById('sc_b_num').textContent = sb.total;
  document.getElementById('sc_a_num').style.color = acol;
  document.getElementById('sc_b_num').style.color = bcol;
  document.getElementById('sc_a_verdict').textContent = averd;
  document.getElementById('sc_a_verdict').style.color = acol;
  document.getElementById('sc_b_verdict').textContent = bverd;
  document.getElementById('sc_b_verdict').style.color = bcol;

  const diff = Math.abs(sa.total - sb.total).toFixed(2);
  const winner = sa.total >= sb.total ? a.brand + ' ' + a.model : b.brand + ' ' + b.model;
  document.getElementById('sc_a_sub').textContent = a.year + ' · ' + fmtKm(a.km);
  document.getElementById('sc_b_sub').textContent = b.year + ' · ' + fmtKm(b.km);

  if (diff < 0.3) {
    document.getElementById('winnerBanner').textContent = '🤝 İki araç neredeyse eşit puan aldı. İkisi de değerlendirilebilir.';
  } else {
    document.getElementById('winnerBanner').textContent = '🏆 ' + winner + ' ' + diff + ' puan farkla öne çıkıyor.';
  }

  document.getElementById('resultSection').classList.add('show');
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
